apiVersion: v1
kind: Service
metadata:
  name: chatops-backend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "chatops.backend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "chatops.backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 4000
      targetPort: http
      protocol: TCP
