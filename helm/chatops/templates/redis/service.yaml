apiVersion: v1
kind: Service
metadata:
  name: chatops-redis
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "chatops.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "chatops.redis.selectorLabels" . | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
