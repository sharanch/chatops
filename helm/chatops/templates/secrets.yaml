# NOTE: In production, use Sealed Secrets or External Secrets Operator.
# This secret is created manually before helm install:
#
#   kubectl create secret generic chatops-secrets \
#     --from-literal=POSTGRES_PASSWORD=your_password \
#     --from-literal=REDIS_PASSWORD=your_password \
#     -n chatops
#
# This file documents the expected secret shape only.
# It is intentionally left as a template reminder — do NOT store
# real passwords here or in values.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: chatops-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "chatops.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep   # Don't delete secret on helm uninstall
type: Opaque
# Passwords are base64-encoded placeholders — override before deploying!
data:
  POSTGRES_PASSWORD: Y2hhdG9wc19zZWNyZXQ=   # chatops_secret (replace!)
  REDIS_PASSWORD: ""
