{{- $existingSecret := lookup "v1" "Secret" .Values.global.namespace "chatops-secrets" }}
apiVersion: v1
kind: Secret
metadata:
  name: chatops-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "chatops.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep   # Don't delete secret on helm uninstall
type: Opaque
data:
  {{- if $existingSecret }}
  # Secret already exists — reuse existing password to avoid DB mismatch
  POSTGRES_PASSWORD: {{ index $existingSecret.data "POSTGRES_PASSWORD" }}
  REDIS_PASSWORD: {{ index $existingSecret.data "REDIS_PASSWORD" | default "" }}
  {{- else if .Values.postgres.auth.password }}
  # Password explicitly set in values — use it
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | b64enc }}
  REDIS_PASSWORD: ""
  {{- else }}
  # First deploy — generate random password
  POSTGRES_PASSWORD: {{ randAlphaNum 32 | b64enc }}
  REDIS_PASSWORD: ""
  {{- end }}