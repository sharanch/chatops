# NOTE: In production, use Sealed Secrets or External Secrets Operator.
apiVersion: v1
kind: Secret
metadata:
  name: chatops-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "chatops.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if .Values.postgres.auth.password }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | b64enc }}
  {{- else }}
  POSTGRES_PASSWORD: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
  REDIS_PASSWORD: ""