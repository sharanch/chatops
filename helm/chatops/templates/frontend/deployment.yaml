apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatops-frontend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "chatops.frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "chatops.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chatops.frontend.selectorLabels" . | nindent 8 }}
    spec:
      # Security: don't run as root
      securityContext:
        runAsNonRoot: true
        runAsUser: 101          # nginx user
        fsGroup: 101
      containers:
        - name: frontend
          image: "{{ .Values.global.imageRegistry }}{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          # Liveness: is Nginx alive?
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          # Readiness: is it ready to serve traffic?
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # Nginx needs to write tmp files
            capabilities:
              drop: ["ALL"]
