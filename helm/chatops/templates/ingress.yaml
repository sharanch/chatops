apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatops-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "chatops.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # API + WebSocket traffic → backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: chatops-backend
                port:
                  number: 4000
          # Socket.io → backend
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: chatops-backend
                port:
                  number: 4000
          # Everything else → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatops-frontend
                port:
                  number: 80
