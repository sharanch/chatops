# ════════════════════════════════════════════════════════
# Minikube / Local Dev overrides
# Usage: helm install chatops ./helm/chatops -f helm/values-dev.yaml
# ════════════════════════════════════════════════════════

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/sharanch/chatops-frontend
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/sharanch/chatops-backend
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

postgres:
  storage: 256Mi

ingress:
  host: chatops.local